        <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game - Birkenstock Edition</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    h1 { margin-bottom: 10px; }

    #score { margin-bottom: 10px; font-size: 18px; }

    button {
      margin-bottom: 10px;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    canvas {
      background: #ffffff;
      border: 2px solid #333;
    }
  </style>
</head>
<body>        
        <h1>Snake Game 🐍</h1>
<div id="score">Score: 0</div>
<button id="startBtn">Start / Restart</button>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake;
  let velocity;
  let sandal;
  let score;
  let gameInterval = null;
  let gameRunning = false;

  function initGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 }
    ];
        velocity = { x: 0, y: 0 };
    score = 0;
    document.getElementById("score").innerText = "Score: 0";
    placeSandal();
    gameRunning = true;
  }

  function startGame() {
    initGame();
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, 150);
  }

  function gameLoop() {
    update();
    draw();
  }

  function update() {
    if (velocity.x === 0 && velocity.y === 0) return;

    const head = {
      x: snake[0].x + velocity.x,
      y: snake[0].y + velocity.y
    };

    if (
      head.x < 0 || head.x >= tileCount ||
      head.y < 0 || head.y >= tileCount
        ) {
      return gameOver();
    }

    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        return gameOver();
      }
    }

    snake.unshift(head);

    if (head.x === sandal.x && head.y === sandal.y) {
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      placeSandal();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "green";
    for (let segment of snake)
    {ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);}

    ctx.fillStyle = "brown";
    ctx.fillRect(sandal.x * gridSize, sandal.y * gridSize, gridSize - 2, gridSize - 2);}

  function placeSandal() {
    sandal = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount)
    };
  }

  function gameOver() {
    clearInterval(gameInterval);
    gameRunning = false;
    alert("Game Over! Final Score: " + score);
  }

  document.addEventListener("keydown", (e) => {
    if (!gameRunning) return;
    switch (e.key) {
      case "ArrowUp":
        if (velocity.y === 1) break;
        velocity = { x: 0, y: -1 };
        break;
      case "ArrowDown":
        if (velocity.y === -1) break;
        velocity = { x: 0, y: 1 };
        break;
      case "ArrowLeft":
        if (velocity.x === 1) break;
        velocity = { x: -1, y: 0 };
        break;
      case "ArrowRight":
        if (velocity.x === -1) break;
        velocity = { x: 1, y: 0 };
        break;
    }
  });

  document.getElementById("startBtn").addEventListener("click", startGame);
</script>

</body>
</html>
